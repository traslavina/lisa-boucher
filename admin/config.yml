backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_photos"
    label: "Site Photos"
    files:
      - name: "photos"
        label: "Photo Gallery & Hero Images"
        file: "data/photos.json"
        description: "Manage hero images and the fieldwork photo gallery"
        fields:
          - label: "Hero Photo"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

          - label: "Hero Accent Photo"
            name: "hero_accent"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

          - label: "Gallery Photos"
            name: "gallery"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string" }
              - { label: "Alt Text", name: "alt", widget: "string" }
